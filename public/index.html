<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYSX-FORC - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <video id="loginVideo" autoplay muted loop playsinline>
      <source src="https://www.gobox.my.id/file/Ctw42iB3HzQZ.mp4" type="video/mp4">
    </video>
    <div class="login-overlay">
      <h1>🔪 SYSX-FORC</h1>
      <p>Forceclose Brutal System</p>
      <form id="loginForm">
        <input type="password" id="passwordInput" placeholder="Password..." required>
        <button type="submit">MASUK!!</button>
      </form>
      <div id="loginError" style="color:#ff0000;display:none;">PASSWORD SALAH, KONTOL!</div>
    </div>
  </div>
  
  <!-- ANIMASI LOGIN (video dari upload.ee) -->
  <div id="loginAnim" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:#000;">
    <video id="animVideo" autoplay muted playsinline style="width:100%;height:100%;object-fit:cover;">
      <source src="https://www.upload.ee/files/19480413/video.mp4.html" type="video/mp4">
    </video>
  </div>

  <script src="script.js"></script>
</body>
</html>
